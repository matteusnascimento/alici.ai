name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # Install only test/runtime essentials for CI
          pip install pytest redis rq
          # Dev tools for linting/type checking
          pip install flake8 mypy

      - name: Start RQ worker (background)
        run: |
          python worker.py &
          sleep 2

      - name: Run tests
        run: |
          pytest -q
      - name: Lint
        run: |
          flake8 . --max-line-length=120 || true
      - name: Type check
        run: |
          mypy . || true
