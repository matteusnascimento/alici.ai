name: launch-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-launch:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      ENV: test
      DATABASE_URL: sqlite:///./test_launch.db
      SECRET_KEY: test-secret-key-change-in-prod
      REDIS_URL: redis://localhost:6379/15
      DEFAULT_AI_PROVIDER: grok
      MEDIA_STORAGE_REQUIRED: "false"
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Compile launch modules
        run: python -m compileall alici_api main.py app_run.py resposta.py

      - name: Run launch tests
        run: pytest --cov=alici_api --cov-report=term-missing

      - name: Doctor smoke
        run: python app_run.py --doctor
