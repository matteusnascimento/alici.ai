name: launch-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  production-backend:
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      ENV: test
      DATABASE_URL: sqlite:///./test_backend.db
      SECRET_KEY: test-secret-key-change-in-prod
      REDIS_URL: redis://localhost:6379/15
      DEFAULT_AI_PROVIDER: groq
      MEDIA_STORAGE_REQUIRED: "false"
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      PYTHONPATH: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install production backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r requirements-test.txt

      - name: Compile production backend
        run: |
          cd backend
          python -m compileall app alembic

      - name: Validate Alembic graph
        run: |
          cd backend
          alembic heads

      - name: Run backend tests
        run: pytest tests/backend -q

  legacy-launch:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      ENV: test
      DATABASE_URL: sqlite:///./test_launch.db
      SECRET_KEY: test-secret-key-change-in-prod
      REDIS_URL: redis://localhost:6379/15
      DEFAULT_AI_PROVIDER: groq
      MEDIA_STORAGE_REQUIRED: "false"
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Compile legacy launch modules
        run: python -m compileall alici_api main.py app_run.py resposta.py

      - name: Run legacy launch tests
        run: pytest tests/launch --cov=alici_api --cov-report=term-missing

      - name: Doctor smoke
        run: python app_run.py --doctor
