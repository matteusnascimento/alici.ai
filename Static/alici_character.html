<!-- alici_character.html - Interface com personagem animado -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alici - Personagem Animado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ffaa;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            width: 90%;
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid #8b5cf6;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 60px rgba(139, 92, 246, 0.4);
            backdrop-filter: blur(10px);
        }

        .titulo {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            color: #8b5cf6;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.6);
        }

        .conteudo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        /* SEÇÃO PERSONAGEM */
        .secao-personagem {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .canvas-container {
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.1), rgba(0, 0, 0, 0.5));
            border: 2px solid #8b5cf6;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #alici-canvas {
            width: 100%;
            height: 100%;
            max-width: 400px;
            max-height: 400px;
        }

        .status {
            text-align: center;
            font-size: 14px;
            color: #00ffaa;
            margin-top: 10px;
            min-height: 20px;
        }

        .emocao-info {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
            font-size: 12px;
        }

        .tag {
            background: rgba(139, 92, 246, 0.3);
            border: 1px solid #8b5cf6;
            border-radius: 20px;
            padding: 5px 10px;
            color: #00ffaa;
        }

        /* SEÇÃO CHAT */
        .secao-chat {
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #8b5cf6;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mensagem {
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 90%;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mensagem.usuario {
            background: rgba(0, 255, 170, 0.1);
            border-left: 3px solid #00ffaa;
            align-self: flex-end;
        }

        .mensagem.alici {
            background: rgba(139, 92, 246, 0.2);
            border-left: 3px solid #8b5cf6;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        #mensagem-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #8b5cf6;
            border-radius: 8px;
            padding: 12px;
            color: #00ffaa;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        #mensagem-input:focus {
            border-color: #00ffaa;
        }

        #mensagem-input::placeholder {
            color: #8b5cf6;
        }

        #enviar-btn {
            background: linear-gradient(135deg, #8b5cf6, #00ffaa);
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        #enviar-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.6);
        }

        #enviar-btn:active {
            transform: translateY(0);
        }

        /* Scroll customizado */
        .chat-box::-webkit-scrollbar {
            width: 8px;
        }

        .chat-box::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.5);
            border-radius: 4px;
        }

        .chat-box::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 92, 246, 0.8);
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .conteudo {
                grid-template-columns: 1fr;
            }

            .secao-chat {
                height: 400px;
            }

            .container {
                padding: 20px;
            }
        }

        .pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="titulo">✨ Alici - Inteligência Animada ✨</h1>

        <div class="conteudo">
            <!-- PERSONAGEM -->
            <div class="secao-personagem">
                <div class="canvas-container">
                    <canvas id="alici-canvas" width="400" height="400"></canvas>
                </div>
                <div class="status" id="status">Esperando...</div>
                <div class="emocao-info" id="emocao-info"></div>
            </div>

            <!-- CHAT -->
            <div class="secao-chat">
                <div class="chat-box" id="chat-box">
                    <div class="mensagem alici">
                        Olá! Eu sou a Alici. ✨ Está tudo bem? Posso ajudar com algo?
                    </div>
                </div>

                <div class="input-area">
                    <input
                        type="text"
                        id="mensagem-input"
                        placeholder="Digite sua pergunta para Alici..."
                        autocomplete="off"
                    />
                    <button id="enviar-btn">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/Static/alici_animator.js"></script>
</body>
</html>
