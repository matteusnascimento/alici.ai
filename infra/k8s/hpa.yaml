apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alici-api-hpa
  namespace: alici-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alici-api
  minReplicas: 3
  maxReplicas: 40
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alici-workers-hpa
  namespace: alici-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alici-workers
  minReplicas: 4
  maxReplicas: 80
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
