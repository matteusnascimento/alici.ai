apiVersion: apps/v1
kind: Deployment
metadata:
  name: alici-api
  namespace: alici-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: alici-api
  template:
    metadata:
      labels:
        app: alici-api
    spec:
      containers:
      - name: api
        image: ghcr.io/matteusnascimento/alici-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: ENV
          value: production
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: alici-secrets
              key: database_url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: alici-secrets
              key: redis_url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: alici-secrets
              key: openai_api_key
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        readinessProbe:
          httpGet:
            path: /api/platform/overview
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/platform/overview
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: alici-api
  namespace: alici-prod
spec:
  selector:
    app: alici-api
  ports:
  - port: 80
    targetPort: 8000
