services:
  - type: web
    name: alici-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && cd frontend && npm ci && npm run build
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/live
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: NODE_VERSION
        value: "20.19.0"
      - key: ENV
        value: production
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://alici-ai.onrender.com
      - key: APP_BASE_URL
        value: https://alici-ai.onrender.com
      - key: DEFAULT_AI_PROVIDER
        value: grok
      - key: GROK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SUCCESS_URL
        value: https://alici-ai.onrender.com/app/billing/success?session_id={CHECKOUT_SESSION_ID}
      - key: STRIPE_CANCEL_URL
        value: https://alici-ai.onrender.com/app/billing/cancel
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_GRAPH_API_VERSION
        value: v20.0
      - key: TIKTOK_CLIENT_KEY
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
      - key: TIKTOK_WEBHOOK_SECRET
        sync: false

  - type: worker
    name: alici-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: arq alici_api.jobs.queue.WorkerSettings
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ENV
        value: production
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        fromService:
          type: web
          name: alici-api
          envVarKey: SECRET_KEY
      - key: JWT_SECRET
        fromService:
          type: web
          name: alici-api
          envVarKey: JWT_SECRET
