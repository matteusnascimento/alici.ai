databases:
  - name: axi-db
    plan: free
    databaseName: axidb
    user: axi

services:
  - type: web
    name: axi-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python scripts/render_migrate.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: axi-db
          property: connectionString
      - key: ENABLE_DEV_SEED_USER
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: CORS_ALLOWED_ORIGINS
        value: https://axi-frontend.onrender.com
      - key: DEFAULT_AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

  - type: web
    name: axi-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://axi-backend.onrender.com/api
