databases:
  - name: axi-db
    plan: free
    databaseName: axidb
    user: axi

services:
  - type: web
    name: axi-backend
    runtime: python
    rootDir: backend
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt && cd ../frontend && npm ci && npm run build && test -f dist/index.html && cd ../backend && rm -rf frontend_dist && cp -r ../frontend/dist frontend_dist && python scripts/render_migrate.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: NODE_VERSION
        value: "20.19.0"
      - key: DATABASE_URL
        fromDatabase:
          name: axi-db
          property: connectionString
      - key: ENABLE_DEV_SEED_USER
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: CORS_ALLOWED_ORIGINS
        value: https://alici-ai.onrender.com
      - key: DEFAULT_AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      # ── Stripe ─────────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        value: price_1TMbAr1R77fHca3oJBUrTAwx
      - key: STRIPE_PRICE_PRO_YEARLY
        value: price_1TMbC01R77fHca3o8gGdQ077
      - key: STRIPE_PRICE_BUSINESS_MONTHLY
        value: price_1TMc9Z1R77fHca3oiD7SvEAG
      - key: STRIPE_PRICE_BUSINESS_YEARLY
        value: price_1TMcAH1R77fHca3oc3TrPQRu
      - key: STRIPE_PRICE_TEST
        value: price_1TMXGJ1R77fHca3oXmx5gtZy
      - key: APP_BASE_URL
        value: https://alici-ai.onrender.com
      - key: STRIPE_SUCCESS_URL
        value: https://alici-ai.onrender.com/app/billing/success?session_id={CHECKOUT_SESSION_ID}
      - key: STRIPE_CANCEL_URL
        value: https://alici-ai.onrender.com/app/billing/cancel

