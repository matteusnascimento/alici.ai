<script>
    function createParticles() {
        const container = document.getElementById('particles');
        container.innerHTML = '';
        const colors = ['#00ffff', '#0066ff', '#ff0099', '#9933ff', '#00ff66'];
        
        for (let i = 0; i < 100; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
            const color = colors[Math.floor(Math.random() * colors.length)];
            particle.style.background = color;
            particle.style.boxShadow = `0 0 10px ${color}`;
            container.appendChild(particle);
        }
    }

    let currentState = 'online';

    function changeState(state) {
        const indicator = document.getElementById('indicator');
        const label = document.getElementById('statusLabel');
        const buttons = document.querySelectorAll('.control-btn');

        buttons.forEach(btn => btn.classList.remove('active'));

        const states = {
            'analyze': { color: '#ff0099', label: 'Analisando', shadow: '0 0 40px #ff0099' },
            'process': { color: '#00ff66', label: 'Processando', shadow: '0 0 40px #00ff66' },
            'learn': { color: '#ffcc00', label: 'Aprendendo', shadow: '0 0 40px #ffcc00' },
            'respond': { color: '#00ffff', label: 'Respondendo', shadow: '0 0 40px #00ffff' },
            'online': { color: '#00ffff', label: 'Online', shadow: '0 0 20px #00ffff' }
        };

        if (states[state]) {
            indicator.style.background = states[state].color;
            indicator.style.boxShadow = states[state].shadow;
            label.textContent = states[state].label;
            label.style.textShadow = states[state].shadow;
        }

        currentState = state;
    }

    async function sendMsg() {
        const input = document.getElementById('userInput');
        const msg = input.value.trim();
        if (!msg) return;

        addMessage(msg, 'user');
        input.value = '';
        input.focus();

        changeState('analyze');

        try {
            await new Promise(r => setTimeout(r, 800));
            changeState('process');

            const token = localStorage.getItem('alici_token');

            const response = await fetch(`${window.location.origin}/chat`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token ? `Bearer ${token}` : ''
                },
                body: JSON.stringify({
                    pergunta: msg,
                    incluir_emocao: false
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();

            changeState('respond');

            setTimeout(() => {
                if (data && data.resposta) {
                    addMessage(data.resposta, 'ai');
                } else {
                    addMessage('Resposta inválida do servidor.', 'ai');
                }

                setTimeout(() => {
                    changeState('online');
                }, 1500);

            }, 600);

        } catch (error) {
            console.error("Erro na requisição:", error);
            addMessage('Erro de conexão com o servidor.', 'ai');
            changeState('online');
        }
    }

    function addMessage(text, sender) {
        const container = document.getElementById('messages');
        const msg = document.createElement('div');
        msg.className = `message ${sender}-message`;
        msg.textContent = text;
        container.appendChild(msg);
        container.scrollTop = container.scrollHeight;
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMsg();
        }
    }

    document.addEventListener('DOMContentLoaded', () => {

        const token = localStorage.getItem('alici_token');
        const user = JSON.parse(localStorage.getItem('alici_user') || '{}');

        if (!token) {
            window.location.href = '/';
            return;
        }

        if (user.nome) {
            const subtitle = document.querySelector('.subtitle-futuristic');
            if (subtitle) {
                subtitle.textContent = `Bem-vindo, ${user.nome}`;
            }
        }

        createParticles();
        document.getElementById('userInput').focus();

        setTimeout(() => {
            changeState('learn');
            setTimeout(() => {
                changeState('online');
            }, 3000);
        }, 1500);

        setInterval(createParticles, 40000);
    });

    function logout() {
        localStorage.removeItem('alici_token');
        localStorage.removeItem('alici_user');
        window.location.href = '/';
    }
</script>
