<script>
    function safeGet(id) {
        return document.getElementById(id);
    }

    function createParticles() {
        const container = safeGet('particles');
        if (!container) return;

        container.innerHTML = '';
        const colors = ['#00ffff', '#0066ff', '#ff0099', '#9933ff', '#00ff66'];

        for (let i = 0; i < 100; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
            const color = colors[Math.floor(Math.random() * colors.length)];
            particle.style.background = color;
            particle.style.boxShadow = `0 0 10px ${color}`;
            container.appendChild(particle);
        }
    }

    function changeState(state) {
        const indicator = safeGet('indicator');
        const label = safeGet('statusLabel');

        if (!indicator || !label) return;

        const states = {
            analyze: { color: '#ff0099', label: 'Analisando', shadow: '0 0 40px #ff0099' },
            process: { color: '#00ff66', label: 'Processando', shadow: '0 0 40px #00ff66' },
            learn: { color: '#ffcc00', label: 'Aprendendo', shadow: '0 0 40px #ffcc00' },
            respond: { color: '#00ffff', label: 'Respondendo', shadow: '0 0 40px #00ffff' },
            online: { color: '#00ffff', label: 'Online', shadow: '0 0 20px #00ffff' }
        };

        if (states[state]) {
            indicator.style.background = states[state].color;
            indicator.style.boxShadow = states[state].shadow;
            label.textContent = states[state].label;
            label.style.textShadow = states[state].shadow;
        }
    }

    function addMessage(text, sender) {
        const container = safeGet('messages');
        if (!container) return;

        const msg = document.createElement('div');
        msg.className = `message ${sender}-message`;
        msg.textContent = text;
        container.appendChild(msg);
        container.scrollTop = container.scrollHeight;
    }

    async function sendMsg() {
        const input = safeGet('userInput');
        if (!input) return;

        const msg = input.value.trim();
        if (!msg) return;

        addMessage(msg, 'user');
        input.value = '';
        input.focus();

        changeState('analyze');

        try {
            await new Promise(r => setTimeout(r, 500));
            changeState('process');

            const token = localStorage.getItem('alici_token');

            const response = await fetch(`${window.location.origin}/chat`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...(token ? { 'Authorization': `Bearer ${token}` } : {})
                },
                body: JSON.stringify({
                    pergunta: msg,
                    incluir_emocao: false
                })
            });

            if (!response.ok) {
                console.error("HTTP Error:", response.status);
                throw new Error("Erro HTTP");
            }

            let data;
            try {
                data = await response.json();
            } catch {
                throw new Error("Resposta inválida do servidor");
            }

            changeState('respond');

            setTimeout(() => {
                addMessage(data?.resposta || "Sem resposta do servidor.", 'ai');
                setTimeout(() => changeState('online'), 1200);
            }, 500);

        } catch (error) {
            console.error("Erro na requisição:", error);
            addMessage("Erro ao conectar com o servidor.", 'ai');
            changeState('online');
        }
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMsg();
        }
    }

    function logout() {
        localStorage.removeItem('alici_token');
        localStorage.removeItem('alici_user');
        window.location.href = '/';
    }

    document.addEventListener('DOMContentLoaded', () => {

        let token = null;
        let user = {};

        try {
            token = localStorage.getItem('alici_token');
            user = JSON.parse(localStorage.getItem('alici_user') || '{}');
        } catch (e) {
            console.warn("Erro ao acessar localStorage");
        }

        if (!token) {
            window.location.href = '/';
            return;
        }

        if (user?.nome) {
            const subtitle = document.querySelector('.subtitle-futuristic');
            if (subtitle) {
                subtitle.textContent = `Bem-vindo, ${user.nome}`;
            }
        }

        createParticles();

        const input = safeGet('userInput');
        if (input) input.focus();

        setTimeout(() => {
            changeState('learn');
            setTimeout(() => changeState('online'), 3000);
        }, 1500);

        setInterval(createParticles, 40000);
    });
</script>
