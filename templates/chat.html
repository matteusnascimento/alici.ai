<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ALICI - Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto flex min-h-screen w-full max-w-5xl flex-col px-4 py-4">
    <header class="mb-4 flex flex-wrap items-center justify-between gap-3 rounded-lg border border-slate-800 bg-slate-900/80 px-4 py-3">
      <div>
        <h1 class="text-lg font-semibold">ALICI</h1>
        <p class="text-sm text-slate-400">Chat IA</p>
      </div>
      <div class="flex flex-wrap items-center gap-2 text-sm">
        <span id="creditBalance" class="rounded-md bg-emerald-500/15 px-3 py-2 text-emerald-200">Creditos: --</span>
        <a href="/jobs" class="rounded-md bg-slate-800 px-3 py-2 hover:bg-slate-700">Jobs</a>
        <button id="logoutBtn" class="rounded-md bg-rose-600 px-3 py-2 text-white hover:bg-rose-500">Sair</button>
      </div>
    </header>

    <section id="messages" class="flex-1 space-y-3 overflow-y-auto rounded-lg border border-slate-800 bg-slate-900/50 p-4"></section>

    <form id="chatForm" class="mt-4 flex flex-col gap-3 sm:flex-row">
      <textarea id="userInput" rows="2" class="min-h-14 flex-1 resize-none rounded-lg border border-slate-700 bg-slate-900 px-3 py-3 outline-none focus:border-cyan-400" placeholder="Digite sua mensagem..."></textarea>
      <button class="rounded-lg bg-cyan-500 px-5 py-3 font-semibold text-slate-950 hover:bg-cyan-400">Enviar</button>
    </form>
  </main>

  <script>
    const token = localStorage.getItem('access_token');
    if (!token) window.location.href = '/';

    const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token });
    const messages = document.getElementById('messages');
    const creditBalance = document.getElementById('creditBalance');

    function addMessage(text, side) {
      const item = document.createElement('div');
      item.className = side === 'user'
        ? 'ml-auto max-w-[85%] rounded-lg bg-cyan-600 px-4 py-3 text-white'
        : 'mr-auto max-w-[85%] rounded-lg bg-slate-800 px-4 py-3 text-slate-100';
      item.textContent = text;
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    }

    async function refreshStatus() {
      try {
        const res = await fetch('/api/status', { headers: headers() });
        if (!res.ok) throw new Error('status');
        const data = await res.json();
        creditBalance.textContent = 'Creditos: ' + (data.credit_balance ?? 0);
      } catch {
        creditBalance.textContent = 'Creditos: --';
      }
    }

    document.getElementById('chatForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const input = document.getElementById('userInput');
      const prompt = input.value.trim();
      if (!prompt) return;
      input.value = '';
      addMessage(prompt, 'user');
      addMessage('Processando...', 'ai');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ pergunta: prompt, incluir_emocao: false })
        });
        const data = await res.json();
        messages.lastChild.remove();
        if (!res.ok) throw new Error(data.message || data.detail?.message || 'Erro no chat');
        addMessage(data.resposta || 'Sem resposta.', 'ai');
        if (data.credit_balance !== undefined) creditBalance.textContent = 'Creditos: ' + data.credit_balance;
      } catch (err) {
        messages.lastChild?.remove();
        addMessage(err.message || 'Erro ao conectar com o servidor.', 'ai');
      } finally {
        refreshStatus();
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('access_token');
      localStorage.removeItem('refresh_token');
      localStorage.removeItem('alici_user');
      window.location.href = '/';
    });

    refreshStatus();
    setInterval(refreshStatus, 15000);
  </script>
</body>
</html>
