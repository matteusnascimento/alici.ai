<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALICI™ — Chat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#0a0f1c;
    color:#e5edff;
    font-family:Arial,sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
}

/* Particles */
#particles{
    position:fixed;
    width:100%;
    height:100%;
    top:0;left:0;
    z-index:0;
    pointer-events:none;
}
.particle{
    position:absolute;
    width:4px;height:4px;
    border-radius:50%;
    opacity:0.7;
    animation:float linear infinite;
}
@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

/* Sidebar */
#sidebar{
    position:relative;
    width:240px;
    min-width:240px;
    height:100vh;
    background:rgba(15,23,42,0.82);
    border-right:1px solid rgba(148,163,184,0.18);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:18px 14px;
    z-index:30;
    transition:width 0.3s ease,min-width 0.3s ease;
}

#sidebar.collapsed{
    width:68px;
    min-width:68px;
}

#sidebar.collapsed .sidebar-label,
#sidebar.collapsed .logo-text{
    display:none;
}

#sidebar.collapsed .nav-item{
    justify-content:center;
}

.logo-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:24px;
}

.logo-mark{
    width:34px;height:34px;
    border-radius:10px;
    display:grid;
    place-items:center;
    color:#eef6ff;
    font-weight:800;
    background:linear-gradient(120deg,#2563eb,#22d3ee,#8b5cf6);
    flex-shrink:0;
}

.logo-text strong{display:block;font-size:1rem;}
.logo-text small{color:#94a3b8;font-size:0.75rem;}

nav.nav-menu{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.nav-item{
    width:100%;
    border:1px solid transparent;
    background:transparent;
    color:#e5edff;
    border-radius:12px;
    padding:10px 12px;
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    font-size:0.9rem;
    transition:all 0.3s ease;
    text-decoration:none;
}

.nav-item:hover,
.nav-item.active{
    border-color:rgba(148,163,184,0.22);
    background:rgba(37,99,235,0.16);
    transform:translateY(-1px);
}

.nav-icon{font-size:1.1rem;}

.sidebar-footer{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.collapse-btn{
    width:100%;
    border:1px solid rgba(148,163,184,0.22);
    background:rgba(15,23,42,0.82);
    color:#e5edff;
    border-radius:12px;
    padding:8px;
    cursor:pointer;
    font-size:1rem;
    transition:all 0.3s ease;
}
.collapse-btn:hover{background:rgba(34,211,238,0.12);}

/* Sidebar overlay for mobile */
#sidebarOverlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(2,6,23,0.62);
    z-index:20;
}

/* Main content */
#mainContent{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
    z-index:1;
}

/* Topbar */
#topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 16px;
    background:rgba(15,23,42,0.82);
    border-bottom:1px solid rgba(148,163,184,0.18);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
}

.topbar-left{
    display:flex;
    align-items:center;
    gap:10px;
}

.topbar-right{
    display:flex;
    align-items:center;
    gap:10px;
}

#menuToggleBtn{
    border:1px solid rgba(148,163,184,0.22);
    background:rgba(15,23,42,0.82);
    color:#e5edff;
    border-radius:10px;
    width:36px;height:36px;
    cursor:pointer;
    font-size:1.1rem;
    display:none;
}

#indicator{
    width:12px;height:12px;
    border-radius:50%;
    display:inline-block;
    margin-right:6px;
    background:#00ffff;
    box-shadow:0 0 20px #00ffff;
    flex-shrink:0;
}

#statusLabel{font-size:14px;}

.logout-btn{
    border:1px solid rgba(148,163,184,0.22);
    background:rgba(15,23,42,0.82);
    color:#e5edff;
    border-radius:10px;
    padding:6px 14px;
    cursor:pointer;
    font-size:0.85rem;
    transition:all 0.3s ease;
    margin-left:0;
}
.logout-btn:hover{background:rgba(239,68,68,0.18);border-color:rgba(239,68,68,0.4);}

/* Messages */
#messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.message{
    padding:10px 14px;
    border-radius:10px;
    max-width:80%;
    line-height:1.5;
}

.user-message{
    background:linear-gradient(120deg,rgba(37,99,235,0.9),rgba(34,211,238,0.9));
    align-self:flex-end;
    color:#f8fbff;
}

.ai-message{
    background:rgba(148,163,184,0.14);
    border:1px solid rgba(148,163,184,0.18);
    align-self:flex-start;
}

/* Input area */
#inputArea{
    display:flex;
    padding:12px 16px;
    gap:10px;
    background:rgba(15,23,42,0.9);
    border-top:1px solid rgba(148,163,184,0.18);
}

#userInput{
    flex:1;
    padding:10px 14px;
    border:1px solid rgba(148,163,184,0.22);
    border-radius:10px;
    background:rgba(15,23,42,0.82);
    color:#e5edff;
    outline:none;
    font-size:0.95rem;
    transition:border-color 0.3s ease;
}
#userInput:focus{border-color:rgba(34,211,238,0.5);}

#sendBtn{
    padding:10px 18px;
    border:none;
    background:linear-gradient(120deg,#2563eb,#22d3ee);
    color:#eef6ff;
    cursor:pointer;
    border-radius:10px;
    font-weight:600;
    margin-left:0;
    transition:filter 0.2s ease,transform 0.2s ease;
}
#sendBtn:hover{filter:brightness(1.08);transform:translateY(-1px);}

/* Mobile */
@media(max-width:768px){
    #menuToggleBtn{display:grid;place-items:center;}
    #sidebar{
        position:fixed;
        left:0;top:0;
        transform:translateX(-100%);
        transition:transform 0.3s ease,width 0.3s ease;
        width:240px!important;
        min-width:240px!important;
        z-index:40;
    }
    #sidebar.mobile-open{transform:translateX(0);}
    #sidebar.mobile-open~#sidebarOverlay,
    body.sidebar-open #sidebarOverlay{display:block;}
    #sidebar .sidebar-label,
    #sidebar .logo-text{display:block!important;}
    #sidebar .nav-item{justify-content:flex-start!important;}
}
</style>
</head>

<body>

<div id="particles"></div>

<!-- Sidebar -->
<aside id="sidebar">
    <div>
        <div class="logo-wrap">
            <span class="logo-mark">A</span>
            <div class="logo-text">
                <strong>ALICI™</strong>
                <small>AI Platform</small>
            </div>
        </div>

        <nav class="nav-menu">
            <a href="/" class="nav-item" aria-label="Navegar para Início"><span class="nav-icon" aria-hidden="true">🏠</span><span class="sidebar-label">Início</span></a>
            <a href="/chat" class="nav-item active" aria-label="Chat IA (página atual)" aria-current="page"><span class="nav-icon" aria-hidden="true">💬</span><span class="sidebar-label">Chat IA</span></a>
        </nav>
    </div>

    <div class="sidebar-footer">
        <button class="collapse-btn" id="collapseSidebarBtn" title="Recolher menu" aria-label="Recolher menu de navegação">◀</button>
    </div>
</aside>

<div id="sidebarOverlay"></div>

<!-- Main content -->
<div id="mainContent">
    <div id="topbar">
        <div class="topbar-left">
            <button id="menuToggleBtn" title="Abrir menu" aria-label="Abrir menu de navegação">☰</button>
            <span id="indicator"></span>
            <span id="statusLabel">Online</span>
        </div>
        <div class="topbar-right">
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
    </div>

    <div id="messages"></div>

    <div id="inputArea">
        <input id="userInput" type="text" placeholder="Digite sua mensagem..." onkeydown="handleKey(event)">
        <button id="sendBtn" onclick="sendMsg()">Enviar</button>
    </div>
</div>

<script>
function safeGet(id){
    return document.getElementById(id);
}

function createParticles(){
    const container=safeGet('particles');
    if(!container) return;
    container.innerHTML='';
    const colors=['#00ffff','#0066ff','#ff0099','#9933ff','#00ff66'];
    for(let i=0;i<60;i++){
        const p=document.createElement('div');
        p.className='particle';
        p.style.left=Math.random()*100+'%';
        p.style.animationDelay=Math.random()*20+'s';
        p.style.animationDuration=(Math.random()*15+10)+'s';
        const color=colors[Math.floor(Math.random()*colors.length)];
        p.style.background=color;
        p.style.boxShadow='0 0 10px '+color;
        container.appendChild(p);
    }
}

function changeState(st){
    const indicator=safeGet('indicator');
    const label=safeGet('statusLabel');
    if(!indicator||!label) return;
    const states={
        analyze:{color:'#ff0099',label:'Analisando',shadow:'0 0 40px #ff0099'},
        process:{color:'#00ff66',label:'Processando',shadow:'0 0 40px #00ff66'},
        learn:{color:'#ffcc00',label:'Aprendendo',shadow:'0 0 40px #ffcc00'},
        respond:{color:'#00ffff',label:'Respondendo',shadow:'0 0 40px #00ffff'},
        online:{color:'#00ffff',label:'Online',shadow:'0 0 20px #00ffff'}
    };
    if(states[st]){
        indicator.style.background=states[st].color;
        indicator.style.boxShadow=states[st].shadow;
        label.textContent=states[st].label;
        label.style.textShadow=states[st].shadow;
    }
}

function addMessage(text,sender){
    const container=safeGet('messages');
    if(!container) return;
    const msg=document.createElement('div');
    msg.className='message '+sender+'-message';
    msg.textContent=text;
    container.appendChild(msg);
    container.scrollTop=container.scrollHeight;
}

async function sendMsg(){
    const input=safeGet('userInput');
    if(!input) return;
    const msg=input.value.trim();
    if(!msg) return;
    addMessage(msg,'user');
    input.value='';
    input.focus();
    changeState('analyze');
    try{
        await new Promise(r=>setTimeout(r,400));
        changeState('process');
        const token=localStorage.getItem('access_token');
        const headers={'Content-Type':'application/json'};
        if(token){ headers['Authorization']='Bearer '+token; }
        const response=await fetch(window.location.origin+'/chat',{
            method:'POST',
            headers:headers,
            body:JSON.stringify({pergunta:msg,incluir_emocao:false})
        });
        if(!response.ok){ throw new Error('Erro HTTP'); }
        const data=await response.json();
        changeState('respond');
        setTimeout(()=>{
            addMessage(data.resposta||'Sem resposta do servidor.','ai');
            setTimeout(()=>changeState('online'),1200);
        },400);
    }catch(error){
        console.error(error);
        addMessage('Erro ao conectar com o servidor.','ai');
        changeState('online');
    }
}

function handleKey(e){
    if(e.key==='Enter'&&!e.shiftKey){
        e.preventDefault();
        sendMsg();
    }
}

function logout(){
    localStorage.removeItem('access_token');
    localStorage.removeItem('refresh_token');
    localStorage.removeItem('alici_user');
    localStorage.removeItem('alici_token');
    window.location.href='/';
}

// Sidebar collapse (desktop)
const sidebar=safeGet('sidebar');
const collapseBtn=safeGet('collapseSidebarBtn');
if(collapseBtn&&sidebar){
    collapseBtn.addEventListener('click',function(){
        sidebar.classList.toggle('collapsed');
        collapseBtn.textContent=sidebar.classList.contains('collapsed')?'▶':'◀';
    });
}

// Sidebar mobile toggle
const menuToggleBtn=safeGet('menuToggleBtn');
const overlay=safeGet('sidebarOverlay');
if(menuToggleBtn&&sidebar){
    menuToggleBtn.addEventListener('click',function(){
        sidebar.classList.toggle('mobile-open');
    });
}
if(overlay&&sidebar){
    overlay.addEventListener('click',function(){
        sidebar.classList.remove('mobile-open');
    });
}

document.addEventListener('DOMContentLoaded',function(){
    let token=null;
    try{ token=localStorage.getItem('alici_token'); }catch(e){}
    if(!token){ window.location.href='/'; return; }
    createParticles();
    changeState('learn');
    setTimeout(()=>{ changeState('online'); },2000);
    const input=safeGet('userInput');
    if(input) input.focus();
    setInterval(createParticles,40000);
});
</script>

</body>
</html>
