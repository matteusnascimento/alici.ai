<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALICI™ - Neural Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
         :root {
            --neon-cyan: #00ffff;
            --neon-blue: #0066ff;
            --neon-pink: #ff0099;
            --neon-purple: #9933ff;
            --bg-dark: #0a0a0f;
            --glass-bg: rgba(15, 15, 25, 0.85);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Exo 2', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #0a0a1f 50%, #000033 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        /* Background Effects */
        
        .animated-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(0, 255, 255, 0.15) 0%, transparent 50%), radial-gradient(circle at 70% 50%, rgba(153, 51, 255, 0.15) 0%, transparent 50%);
            animation: bg-shift 20s ease-in-out infinite;
            z-index: 1;
        }
        
        @keyframes bg-shift {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-10%, -10%) scale(1.1) rotate(5deg);
            }
        }
        
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-flow 3s linear infinite;
            z-index: 2;
        }
        
        @keyframes grid-flow {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 50px 50px;
            }
        }
        /* Particles */
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 3;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--neon-cyan);
            border-radius: 50%;
            animation: float-up 20s linear infinite;
            opacity: 0.6;
        }
        
        @keyframes float-up {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }
        /* Main Container */
        
        .login-container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            width: 90%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 2px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 255, 255, 0.2);
            overflow: hidden;
            animation: container-appear 0.8s ease-out;
        }
        
        @keyframes container-appear {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        /* Header */
        
        .login-header {
            text-align: center;
            padding: 40px 30px 30px;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(153, 51, 255, 0.1));
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        .logo-3d {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: 900;
            font-family: 'Orbitron';
            animation: logo-pulse 3s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
        
        @keyframes logo-pulse {
            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 50px rgba(255, 0, 153, 0.7);
            }
        }
        
        .login-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .login-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        /* Form Section */
        
        .form-section {
            padding: 40px 30px;
        }
        
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 15px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron';
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .tab-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: var(--neon-cyan);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        
        .form-container {
            display: none;
        }
        
        .form-container.active {
            display: block;
            animation: form-appear 0.5s ease-out;
        }
        
        @keyframes form-appear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        .input-label {
            display: block;
            margin-bottom: 10px;
            color: var(--neon-cyan);
            font-family: 'Orbitron';
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .input-field {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-family: 'Exo 2';
            outline: none;
            transition: all 0.3s;
        }
        
        .input-field:focus {
            border-color: var(--neon-cyan);
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron';
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.3);
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.5);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: rgba(255, 0, 99, 0.2);
            border: 1px solid var(--neon-pink);
            border-radius: 10px;
            padding: 15px;
            color: var(--neon-pink);
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-10px);
            }
            75% {
                transform: translateX(10px);
            }
        }
        
        .success-message {
            background: rgba(0, 255, 102, 0.2);
            border: 1px solid #00ff66;
            border-radius: 10px;
            padding: 15px;
            color: #00ff66;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }
        /* Footer */
        
        .login-footer {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }
        
        .footer-link {
            color: var(--neon-cyan);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .footer-link:hover {
            color: var(--neon-purple);
        }
        /* Loading */
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto;
            border: 4px solid rgba(0, 255, 255, 0.2);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        /* Responsive */
        
        @media (max-width: 600px) {
            .login-container {
                max-width: 95%;
                margin: 20px;
            }
            .login-title {
                font-size: 2rem;
            }
            .logo-3d {
                width: 100px;
                height: 100px;
                font-size: 50px;
            }
        }
    </style>
</head>

<body>
    <!-- Background Effects -->
    <div class="animated-bg"></div>
    <div class="cyber-grid"></div>
    <div class="particles" id="particles"></div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-header">
            <div class="logo-3d">A</div>
            <h1 class="login-title">ALICI™</h1>
            <p class="login-subtitle">Neural Access System</p>
        </div>

        <div class="form-section">
            <!-- Tab Buttons -->
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Registro</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="form-container active">
                <div id="loginError" class="error-message"></div>
                <div id="loginSuccess" class="success-message"></div>

                <div class="input-group">
                    <label class="input-label">Email</label>
                    <input type="email" id="loginEmail" class="input-field" placeholder="seu@email.com" autocomplete="email">
                </div>

                <div class="input-group">
                    <label class="input-label">Senha</label>
                    <input type="password" id="loginPassword" class="input-field" placeholder="••••••••" autocomplete="current-password">
                </div>

                <button class="submit-btn" onclick="handleLogin()">Acessar Sistema</button>

                <div id="loginLoading" class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 10px; color: var(--neon-cyan);">Autenticando...</p>
                </div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="form-container">
                <div id="registerError" class="error-message"></div>
                <div id="registerSuccess" class="success-message"></div>

                <div class="input-group">
                    <label class="input-label">Nome</label>
                    <input type="text" id="registerName" class="input-field" placeholder="Seu nome completo" autocomplete="name">
                </div>

                <div class="input-group">
                    <label class="input-label">Email</label>
                    <input type="email" id="registerEmail" class="input-field" placeholder="seu@email.com" autocomplete="email">
                </div>

                <div class="input-group">
                    <label class="input-label">Senha</label>
                    <input type="password" id="registerPassword" class="input-field" placeholder="••••••••" autocomplete="new-password">
                </div>

                <button class="submit-btn" onclick="handleRegister()">Criar Conta</button>

                <div id="registerLoading" class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 10px; color: var(--neon-cyan);">Criando conta...</p>
                </div>
            </div>
        </div>

        <div class="login-footer">
            <p>ALICI™ Neural Intelligence System</p>
            <p style="margin-top: 5px;">© 2026 | <a href="#" class="footer-link">Termos de Uso</a></p>
        </div>
    </div>

    <script>
        // Create particles
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#00ffff', '#0066ff', '#ff0099', '#9933ff', '#00ff66'];

            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (10 + Math.random() * 15) + 's';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.boxShadow = `0 0 10px ${particle.style.background}`;
                container.appendChild(particle);
            }
        }

        // Switch between login and register
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const buttons = document.querySelectorAll('.tab-btn');

            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                buttons[0].classList.add('active');
                buttons[1].classList.remove('active');
            } else {
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
                buttons[1].classList.add('active');
                buttons[0].classList.remove('active');
            }

            // Clear messages
            hideMessage('loginError');
            hideMessage('registerError');
            hideMessage('loginSuccess');
            hideMessage('registerSuccess');
        }

        // Show error/success message
        function showMessage(id, message) {
            const element = document.getElementById(id);
            element.textContent = message;
            element.style.display = 'block';
        }

        function hideMessage(id) {
            const element = document.getElementById(id);
            element.style.display = 'none';
        }

        // Handle Login
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            // Validation
            if (!email || !password) {
                showMessage('loginError', 'Por favor, preencha todos os campos.');
                return;
            }

            hideMessage('loginError');
            hideMessage('loginSuccess');
            document.getElementById('loginLoading').classList.add('active');

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        senha: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save token
                    localStorage.setItem('access_token', data.access_token);
                    if (data.refresh_token) {
                        localStorage.setItem('refresh_token', data.refresh_token);
                    }
                    localStorage.setItem('alici_user', JSON.stringify(data.usuario));

                    showMessage('loginSuccess', '✓ Login realizado! Redirecionando...');

                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showMessage('loginError', data.detail || 'Erro ao fazer login');
                }
            } catch (error) {
                showMessage('loginError', 'Erro de conexão. Tente novamente.');
            } finally {
                document.getElementById('loginLoading').classList.remove('active');
            }
        }

        // Handle Register
        async function handleRegister() {
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;

            // Validation
            if (!name || !email || !password) {
                showMessage('registerError', 'Por favor, preencha todos os campos.');
                return;
            }

            if (password.length < 8) {
                showMessage('registerError', 'A senha deve ter no mínimo 8 caracteres.');
                return;
            }

            hideMessage('registerError');
            hideMessage('registerSuccess');
            document.getElementById('registerLoading').classList.add('active');

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nome: name,
                        email,
                        senha: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('registerSuccess', '✓ Conta criada! Faça login para continuar.');

                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('loginEmail').value = email;
                    }, 2000);
                } else {
                    showMessage('registerError', data.detail || 'Erro ao criar conta');
                }
            } catch (error) {
                showMessage('registerError', 'Erro de conexão. Tente novamente.');
            } finally {
                document.getElementById('registerLoading').classList.remove('active');
            }
        }

        // Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const loginActive = document.getElementById('loginForm').classList.contains('active');
                if (loginActive) {
                    handleLogin();
                } else {
                    handleRegister();
                }
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();

            // Check if already logged in
            const token = localStorage.getItem('access_token');
            if (token) {
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>

</html>
