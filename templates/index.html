<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alici - Avatar Holográfico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #00ffff;
            --secondary-color: #00ff88;
            --dark-bg: #0a0e27;
            --darker-bg: #050812;
            --text-light: #e0ffff;
            --text-secondary: #a0d0e0;
            --hologram-primary: #00ffff;
            --hologram-secondary: #00ff88;
            --hologram-accent: #ff00ff;
        }
        
        body {
            background: linear-gradient(135deg, var(--darker-bg), var(--dark-bg), #001133);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .hologram-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 1;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 3;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-left {
            flex: 1;
        }
        
        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .user-info {
            background: rgba(0, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            font-size: 0.9rem;
        }
        
        .logout-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff0066, #ff00ff);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 0, 102, 0.4);
        }
        
        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
        }
        
        .logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, var(--hologram-primary), var(--hologram-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            animation: hologram-pulse 3s infinite;
            border: 2px solid var(--hologram-primary);
        }
        
        @keyframes hologram-pulse {
            0%, 100% { 
                box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 50px rgba(0, 255, 255, 0.8);
                transform: scale(1.05);
            }
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--hologram-primary), var(--hologram-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 30px;
            color: var(--text-secondary);
        }
        
        .main-content {
            display: flex;
            gap: 30px;
            margin: 20px 0;
        }
        
        .chat-section {
            flex: 1;
        }
        
        .hologram-section {
            flex: 0 0 400px;
        }
        
        .chat-container {
            background: rgba(0, 17, 34, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        .chat-history {
            height: 450px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        
        .message {
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 20px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.5;
        }
        
        .user-message {
            background: linear-gradient(135deg, var(--hologram-primary), var(--hologram-secondary));
            margin-left: auto;
            color: var(--dark-bg);
            font-weight: 500;
        }
        
        .ai-message {
            background: rgba(0, 255, 255, 0.15);
            margin-right: auto;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        .input-area {
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 25px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        input {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 25px;
            background: rgba(0, 255, 255, 0.1);
            color: var(--text-light);
            font-size: 16px;
            outline: none;
        }
        
        input:focus {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }
        
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, var(--hologram-primary), var(--hologram-accent));
            color: var(--dark-bg);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 255, 255, 0.6);
        }
        
        .hologram-container {
            background: rgba(0, 17, 34, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.3);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        
        .hologram-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: var(--hologram-primary);
        }
        
        .hologram-display {
            width: 100%;
            height: 350px;
            background: linear-gradient(135deg, var(--darker-bg), var(--dark-bg));
            border-radius: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 18px;
            transition: opacity 0.3s;
        }
        
        .avatar-image.hidden {
            display: none;
        }
        
        .hologram-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--hologram-primary);
            animation: status-pulse 2s infinite;
            box-shadow: 0 0 10px var(--hologram-primary);
        }
        
        @keyframes status-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }
        
        .hologram-controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .hologram-btn {
            padding: 12px 15px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .hologram-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.6);
            transform: translateY(-2px);
        }
        
        @media (max-width: 1024px) {
            .main-content {
                flex-direction: column;
            }
            .hologram-section {
                flex: none;
                order: -1;
            }
            .hologram-container {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="hologram-grid"></div>
    
    <div class="container">
        <header>
            <div class="header-left">
                <div class="logo-container">
                    <div class="logo">A</div>
                </div>
                <h1>Alici 🤖</h1>
                <p class="subtitle">Avatar Holográfico com IA Avançada</p>
            </div>
            <div class="header-right">
                <div class="user-info">
                    👤 <span id="userName">Usuário</span>
                </div>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </header>
        
        <div class="main-content">
            <div class="chat-section">
                <div class="chat-container">
                    <div class="chat-history" id="chatHistory">
                        <div class="message ai-message">
                            Olá! Sou a Alici, sua assistente de IA com avatar holográfico. Como posso ajudar?
                        </div>
                    </div>
                    <div class="input-area">
                        <input type="text" id="userInput" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button onclick="sendMessage()">Enviar</button>
                    </div>
                </div>
            </div>
            
            <div class="hologram-section">
                <div class="hologram-container">
                    <h3 class="hologram-title">Avatar Alici</h3>
                    <div class="hologram-display">
                        <img id="avatarImage" src="/Static/Imagens/Avatar/IMG_1809.jpeg" alt="Avatar" class="avatar-image">
                    </div>
                    <div class="hologram-status">
                        <div class="status-indicator"></div>
                        <div><span id="statusText">Online e pronta</span></div>
                    </div>
                    <div class="hologram-controls">
                        <button class="hologram-btn" onclick="changeAvatar('listen')">👂 Ouvir</button>
                        <button class="hologram-btn" onclick="changeAvatar('think')">🧠 Pensar</button>
                        <button class="hologram-btn" onclick="changeAvatar('speak')">💬 Falar</button>
                        <button class="hologram-btn" onclick="changeAvatar('idle')">😊 Idle</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const avatars = {
            idle: '/Static/Imagens/Avatar/IMG_1809.jpeg',
            listen: '/Static/Imagens/Avatar/IMG_1806.jpeg',
            think: '/Static/Imagens/Avatar/IMG_1795.jpeg',
            speak: '/Static/Imagens/Avatar/IMG_1807.jpeg'
        };
        
        const token = localStorage.getItem('access_token');
        
        if (!token) {
            window.location.href = '/';
        }
        
        // Carregar nome do usuário
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/status', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                document.getElementById('userName').textContent = data.usuario;
            } catch (error) {
                console.error('Erro ao carregar info:', error);
            }
        }
        
        function changeAvatar(state) {
            document.getElementById('avatarImage').src = avatars[state];
        }
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            
            changeAvatar('listen');
            
            setTimeout(() => {
                changeAvatar('think');
                
                fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ pergunta: message })
                })
                .then(r => r.json())
                .then(data => {
                    changeAvatar('speak');
                    setTimeout(() => addMessage(data.resposta, 'ai'), 500);
                    setTimeout(() => changeAvatar('idle'), 2000);
                })
                .catch(error => {
                    console.error('Erro:', error);
                    changeAvatar('idle');
                });
            }, 800);
        }
        
        function addMessage(text, type) {
            const chatHistory = document.getElementById('chatHistory');
            const msg = document.createElement('div');
            msg.className = `message ${type}-message`;
            msg.textContent = text;
            chatHistory.appendChild(msg);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
        
        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/';
        }
        
        loadUserInfo();
    </script>
</body>
</html>
